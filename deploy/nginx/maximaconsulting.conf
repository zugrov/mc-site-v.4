# maxima consulting — статический лендинг mc-site-v4
# Установка: ln -s /opt/maxima-consulting/apps/mc-site-v.4/deploy/nginx/maximaconsulting.conf /etc/nginx/sites-enabled/
# После certbot --nginx SSL-блоки добавятся автоматически.

# Редирект со старого домена
server {
    listen 80;
    listen [::]:80;
    server_name maxima-consulting.ru www.maxima-consulting.ru;

    return 301 https://maximaconsulting.ru$request_uri;
}

# Основной домен — статика
server {
    listen 80;
    listen [::]:80;
    server_name maximaconsulting.ru www.maximaconsulting.ru;

    root /var/www/maxima-consulting/static/mc-site-v4;
    index index.html;

    # Сжатие
    gzip on;
    gzip_types text/plain text/css application/javascript application/json image/svg+xml;
    gzip_min_length 256;

    # Безопасность
    add_header X-Frame-Options "SAMEORIGIN" always;
    add_header X-Content-Type-Options "nosniff" always;
    add_header Referrer-Policy "strict-origin-when-cross-origin" always;

    location /assets/ {
        expires 30d;
        add_header Cache-Control "public, immutable";
    }

    location / {
        try_files $uri $uri/ =404;
    }

    location ~ /\. {
        deny all;
    }
}
